services:
  - type: web
    name: signaldesk-api
    runtime: node
    rootDir: .
    plan: starter
    buildCommand: npm install && npm run db:generate -w @signaldesk/api && npm run build
    startCommand: npm run db:deploy -w @signaldesk/api && npm run start -w @signaldesk/api
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: signaldesk-db
          property: connectionString
      - key: OPERATOR_API_KEY
        generateValue: true
      - key: CORS_ORIGIN
        value: https://signaldesk-web.vercel.app

databases:
  - name: signaldesk-db
    plan: starter
